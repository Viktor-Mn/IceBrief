<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вхід — Brief Manager</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

<div class="auth-background"></div>

<div class="auth-container glass-card">
    <h2 class="auth-title">Вхід в систему</h2>
    <form id="loginForm" class="auth-form">
        <input type="email" name="email" placeholder="Email" required autocomplete="email">
        <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password">
        <button type="submit" class="btn btn-gradient">Увійти</button>
    </form>
    <p class="auth-footer">
        Немає акаунту? <a href="/register.html">Зареєструватися</a>
    </p>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
