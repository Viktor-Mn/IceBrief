<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Реєстрація — Brief Manager</title>
<link rel="stylesheet" href="/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

<div class="auth-background"></div>

<div class="auth-container glass-card">
    <h2 class="auth-title">Реєстрація</h2>
    <form id="registerForm" class="auth-form">
        <input type="email" name="email" placeholder="Email" required autocomplete="email">
        <input type="password" name="password" placeholder="Придумайте пароль" required autocomplete="new-password">
        <button type="submit" class="btn btn-gradient">Зареєструватися</button>
    </form>
    <p class="auth-footer">
        Вже є акаунт? <a href="/login.html">Увійти</a>
    </p>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
